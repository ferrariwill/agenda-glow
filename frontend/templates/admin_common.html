{{define "admin_head"}}
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          surface: { 950: '#0a0c10', 900: '#111318', 800: '#181c24', 700: '#222833', 600: '#2d3544' },
          accent: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }
        }
      }
    }
  }
</script>
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');
  body { font-family: 'DM Sans', system-ui, sans-serif; }
  .htmx-request .btn-spinner { display: inline-block; }
  .btn-spinner { display: none; }
</style>
{{end}}

{{define "admin_nav"}}
<nav class="flex flex-wrap gap-2 mb-8">
  <a href="/admin/servicos"
     class="px-4 py-2 rounded-xl text-sm font-semibold transition-colors {{if eq .NavActive "servicos"}}bg-accent-600 text-white{{else}}bg-surface-800 text-slate-400 hover:text-white border border-surface-600{{end}}">
    Procedimentos
  </a>
  <a href="/admin/equipe"
     class="px-4 py-2 rounded-xl text-sm font-semibold transition-colors {{if eq .NavActive "equipe"}}bg-accent-600 text-white{{else}}bg-surface-800 text-slate-400 hover:text-white border border-surface-600{{end}}">
    Equipe
  </a>
  <a href="/admin/caixa"
     class="px-4 py-2 rounded-xl text-sm font-semibold transition-colors {{if eq .NavActive "caixa"}}bg-accent-600 text-white{{else}}bg-surface-800 text-slate-400 hover:text-white border border-surface-600{{end}}">
    Caixa
  </a>
  <a href="/dashboard/gerencial"
     class="px-4 py-2 rounded-xl text-sm font-semibold bg-surface-800 text-slate-400 hover:text-white border border-surface-600 transition-colors ml-auto">
    Painel Gerencial →
  </a>
</nav>
{{end}}

{{define "admin_header"}}
<header class="mb-8">
  <p class="text-xs uppercase tracking-widest text-accent-400 font-semibold mb-1">AgendaGlow · Configuração</p>
  <h1 class="text-2xl sm:text-3xl font-bold text-white">{{.EstabelecimentoNome}}</h1>
</header>
{{end}}
